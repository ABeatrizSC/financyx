services:
  mysql-db:
    image: mysql:8.0.34
    container_name: fynancyx-mysql-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=financyx_db
      - TZ=America/Sao_Paulo
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s
    networks:
      - financyx-network

networks:
  financyx-network:
    driver: bridge